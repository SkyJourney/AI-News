server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Astro _astro/ 产物文件名自带 content hash，可放心长缓存
    location /_astro/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
