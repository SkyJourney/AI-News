# AInews · F2.7 本地 Docker 部署（LAN-only，无内网穿透）
# builder：一次性容器，构建 Astro 静态站点；web：常驻 nginx，served 共享 volume
services:
  builder:
    build:
      context: ./frontend
    volumes:
      # vault 5 目录只读挂载，相对路径复现 web/frontend 与仓库根的实际嵌套关系
      # （src/lib/vault-loader.ts 用 import.meta.dirname 反推仓库根，见该文件注释）
      - ../10-Daily:/app/10-Daily:ro
      - ../20-Topics:/app/20-Topics:ro
      - ../40-Deep-Dives:/app/40-Deep-Dives:ro
      - ../50-Zettel:/app/50-Zettel:ro
      - ../60-Originals:/app/60-Originals:ro
      - site-dist:/app/web/frontend/dist
    profiles: ["build"]

  web:
    image: nginx:alpine
    ports:
      - "8801:80"
    volumes:
      - site-dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  site-dist:
